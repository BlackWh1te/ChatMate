<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #sidebar-header {
      height: 36px;
      background: #0d6efd;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      user-select: none;
    }
    #sidebar-header button {
      background: none;
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }
    #sidebar-header button:hover {
      background: rgba(255,255,255,0.2);
    }
    iframe {
      flex: 1;
      border: none;
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="sidebar-header">
    <span>💬 ChatMate</span>
    <button id="close-btn" title="Hide sidebar">✕</button>
  </div>
  <iframe id="popup-frame" src="popup.html?mode=sidebar"></iframe>
  <script>
    document.getElementById('close-btn').addEventListener('click', function() {
      window.parent.postMessage({action: 'toggleSidebar', visible: false}, '*');
    });
  </script>
</body>
</html>
