<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafbfc;
      transition: background 0.35s ease;
    }
    body.dark {
      background: #0a0a0f;
    }
    #sidebar-header {
      height: 44px;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      user-select: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    #sidebar-header span {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #sidebar-header button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    #sidebar-header button:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }
    #sidebar-header button:active {
      transform: scale(0.95);
    }
    iframe {
      flex: 1;
      border: none;
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="sidebar-header">
    <span>💬 ChatMate</span>
    <button id="close-btn" title="Hide sidebar">✕</button>
  </div>
  <iframe id="popup-frame" src="popup.html?mode=sidebar"></iframe>
  <script>
    document.getElementById('close-btn').addEventListener('click', function() {
      window.parent.postMessage({action: 'toggleSidebar', visible: false}, '*');
    });
  </script>
</body>
</html>
