<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --secondary-text: #666666;
      --border-color: #dddddd;
      --input-bg: #ffffff;
      --response-bg: #f5f5f5;
      --error-bg: #ffeeee;
      --error-text: #cc0000;
    }

    [data-theme="dark"] {
      --bg-color: #1e1e1e;
      --text-color: #e0e0e0;
      --secondary-text: #a0a0a0;
      --border-color: #444444;
      --input-bg: #2d2d2d;
      --response-bg: #2d2d2d;
      --error-bg: #3a1f1f;
      --error-text: #ff6b6b;
    }

    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: var(--text-color);
    }
    .section {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--secondary-text);
      margin-bottom: 4px;
    }
    textarea, select {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      background-color: var(--input-bg);
      color: var(--text-color);
      box-sizing: border-box;
    }
    textarea {
      height: 100px;
      resize: vertical;
    }
    button {
      background: #007AFF;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .response {
      background: var(--response-bg);
      padding: 12px;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      color: var(--text-color);
      display: none;
    }
    .response.show {
      display: block;
    }
    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--secondary-text);
    }
    .loading.show {
      display: block;
    }
    .error {
      background: var(--error-bg);
      color: var(--error-text);
      padding: 12px;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 14px;
      display: none;
    }
    .error.show {
      display: block;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .actions button {
      flex: 1;
    }
    .copy-btn {
      background: #34C759;
    }
    .copy-btn:hover {
      background: #28a745;
    }
    .settings-link {
      text-align: center;
      margin-top: 16px;
    }
    .settings-link a {
      color: #007AFF;
      text-decoration: none;
      font-size: 12px;
    }
    .settings-link a:hover {
      text-decoration: underline;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      width: auto;
    }
    .theme-toggle:hover {
      background: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💬 ChatMate</h1>
    <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>
  </div>

  <div class="section">
    <label for="template-select">Response Style (optional):</label>
    <select id="template-select" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 14px; box-sizing: border-box;">
      <option value="">Default</option>
    </select>
  </div>

  <div class="section">
    <label for="input-text">Selected text or type your message:</label>
    <textarea id="input-text" placeholder="Select text on a page or type here..."></textarea>
  </div>
  
  <button id="generate-btn">Generate Response</button>
  
  <div class="loading" id="loading">
    <p>Thinking...</p>
  </div>
  
  <div class="error" id="error"></div>
  
  <div class="response" id="response"></div>
  
  <div class="actions" id="actions" style="display: none;">
    <button class="copy-btn" id="copy-btn">Copy</button>
    <button id="clear-btn">Clear</button>
  </div>
  
  <div class="settings-link">
    <a href="settings.html" target="_blank">⚙️ Settings</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
